<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="stylesheet" href="../../static/css/misc.css" />
  <style>
    body {
      padding: 1.4rem 1rem 1.8rem;
      background: #ffffff;
    }

    .gallery-shell {
      width: min(1120px, calc(100% - 1rem));
      margin: 0 auto;
    }

    .gallery-head {
      margin: 0 0 0.95rem;
      padding: 1rem 1.05rem;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .gallery-kicker {
      margin: 0 0 0.25rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .gallery-head h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(1.7rem, 3vw, 2.35rem);
      line-height: 1.25;
    }

    .gallery-subtitle {
      margin: 0.45rem 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .gallery-tabs {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      overflow-x: auto;
      padding: 0.15rem 0.1rem 0.4rem;
      margin-bottom: 0.85rem;
      scrollbar-width: thin;
      scroll-padding-inline: 1rem;
    }

    .gallery-tab {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--accent);
      padding: 0.7rem 1rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, background-color 0.15s ease, color 0.15s ease;
    }

    .gallery-tab:hover {
      transform: translateY(-1px);
      background: var(--panel);
    }

    .gallery-tab.is-active {
      color: #ffffff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .gallery-viewer {
      display: grid;
      gap: 0.85rem;
      grid-template-columns: minmax(0, 1fr);
    }

    .viewer-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .photo-stage {
      position: relative;
      overflow: hidden;
      min-height: min(82vh, 860px);
      display: grid;
      place-items: center;
      background: #ffffff;
    }

    .photo-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .photo-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      will-change: transform, opacity;
      transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.42s ease;
    }

    .photo-image-current {
      z-index: 1;
      transform: translateX(0);
      opacity: 1;
    }

    .photo-image-next {
      z-index: 0;
      opacity: 0;
      visibility: hidden;
    }

    .photo-image-next.is-ready {
      visibility: visible;
    }

    .photo-image.enter-from-right {
      transform: translateX(100%);
      opacity: 1;
    }

    .photo-image.enter-from-left {
      transform: translateX(-100%);
      opacity: 1;
    }

    .photo-image.exit-to-left {
      transform: translateX(-18%);
      opacity: 0;
    }

    .photo-image.exit-to-right {
      transform: translateX(18%);
      opacity: 0;
    }

    .photo-image.to-center {
      transform: translateX(0);
      opacity: 1;
    }

    .photo-caption {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      max-width: calc(100% - 2rem);
      min-width: min(760px, calc(100% - 2rem));
      padding: 0.6rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--accent);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(11, 36, 71, 0.12);
      text-align: center;
      line-height: 1.35;
    }

    .caption-main {
      font-weight: 700;
      font-size: 0.98rem;
    }

    .caption-sub {
      margin-top: 0.22rem;
      font-size: 0.92rem;
      color: var(--ink);
    }

    .viewer-controls {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      z-index: 2;
    }

    .nav-btn {
      pointer-events: auto;
      margin: 0 0.7rem;
      width: 3rem;
      height: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--accent);
      box-shadow: 0 10px 24px rgba(11, 36, 71, 0.16);
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px) scale(1.03);
      background: #ffffff;
    }

    @media (max-width: 700px) {
      body {
        padding: 0.9rem 0.7rem 1.2rem;
      }

      .gallery-shell {
        width: calc(100% - 0.2rem);
      }

      .gallery-head {
        padding-left: 0.85rem;
        padding-right: 0.85rem;
      }

      .photo-stage {
        min-height: min(72vh, 700px);
      }

      .photo-caption {
        top: 0.8rem;
        max-width: calc(100% - 1.1rem);
        min-width: 0;
        padding: 0.5rem 0.75rem;
        border-radius: 16px;
      }

      .caption-main {
        font-size: 0.9rem;
      }

      .caption-sub {
        font-size: 0.86rem;
      }

      .nav-btn {
        width: 2.65rem;
        height: 2.65rem;
        margin: 0 0.45rem;
      }
    }
  </style>
</head>
<body>
  <a class="back-link" href="../index.html">返回</a>
  <main class="gallery-shell">

    <nav class="gallery-tabs" id="categoryTabs" aria-label="活动类型"></nav>

    <section class="gallery-viewer" aria-live="polite">
      <article class="viewer-card">
        <div class="photo-stage" id="photoStage">
          <div class="photo-viewport">
            <img class="photo-image photo-image-current" id="photoImageCurrent" alt="活动照片" />
            <img class="photo-image photo-image-next" id="photoImageNext" alt="" aria-hidden="true" />
          </div>
          <div class="photo-caption" id="photoCaption"></div>
          <div class="viewer-controls">
            <button class="nav-btn" id="prevButton" type="button" aria-label="上一张">‹</button>
            <button class="nav-btn" id="nextButton" type="button" aria-label="下一张">›</button>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const galleryData = [
      {

            content: "首日山本没等来打线支援，次日道奇投手群联手取胜。",
            image: "./src/25-4-4 Phillies.jpg",
          },
          {

            date: "Aug 1 2025",

            content: "红袜延长战险胜太空人。",
            image: "./src/25-8-1 Red Sox.jpg",
          },
          {
            title: "教士 @ 道奇",
            date: "Aug 16-17 2025",
            place: "道奇体育场, 洛杉矶",
            content: "道奇打线火热，两场比赛都取得胜利。",
            image: "./src/25-8-16 Dodgers.jpg",
          },
          {
            title: "海盗 @ 大都会",
            date: "Mar 29 2026",
            place: "花旗球场, 纽约",
            content: "赛季初海盗打线表现出色，赢下比赛",
            image: "./src/26-3-29 Mets.jpg",
          },
        ],
      },
      {
        type: "HIMEHINA",
        activities: [
          {
            title: "提灯暗航·夏日穿梭",
            date: "Aug 5 2023",
            place: "大宫 SONIC CITY, 埼玉",
            content: "疫情后的首场发声应援 live，5 年武道馆的目标。",
            image: "./src/23-8-5 Summer.jpg",
          },

            image: "./src/24-8-2 Tears.jpg",
          },
          {

            image: "./src/24-11-22 Bubblin.jpg",
          },
        ],
      },
      {
        type: "Live",
        activities: [
          {
            title: "OffKai Expo 2023",
            date: "Jun 17 2023",
            place: "旧金山",
            content: "不太满意的演出，但因此认识了铁鼠。",
            image: "./src/23-6-17 OffKai.jpg",
          },
          {

            content: "见识到了偶像宅。",
            image: "./src/23-8-6 TIF.jpg",
          },
          {
            title: "AniClover 2023",
            date: "Aug 11 2023",
            place: "东京",
            content: "最对味的 Anisong 蹦迪。",
            image: "./src/23-8-11 AniClover.jpg",
          },
          {
            title: "明日的叙景",
            date: "Jun 28 2024",
            place: "北京",
            content: "很硬，听不懂，但很燃。",
            image: "./src/24-6-28 Asuno.jpg",
          },
          {
            title: "AniClover 2024",
            date: "Aug 4 2024",
            place: "东京",
            content: "再战 AniClover，这次知道了学马。",
            image: "./src/24-8-4 AniClover.jpg",
          },
          {
            title: "Hololive STAGE World Tour '24: Soar!",
            date: "Dec 15 2024",
            place: "亚特兰大",
            content: "美国人的应援方式非常奇特豪迈。",
            image: "./src/24-12-15 Holo.jpg",
          },
          {
            title: "I am Gloria",
            date: "Mar 29 2025",
            place: "纽约",
            content: "很少听不是二次元的歌手的现场，但邓紫棋真正的经典而且强大。",
            image: "./src/25-3-29 Gloria.jpg",
          },
          {
            title: "Friend Chord Tour",
            date: "May 28 2025",
            place: "成都",
            content: "Hitorie 很好听，很沉浸，见面会说话很可爱。",
            image: "./src/25-5-28 Hitorie.jpg",
          },
          {
            title: "HIBANA Tour",
            date: "Jul 31 2025",
            place: "芝加哥",
            content: "Ado 太强了，现场效果令人振聋发聩。",
            image: "./src/25-7-31 HIBANA.jpg",
          },
        ],
      },
    ];

    const categoryTabs = document.getElementById("categoryTabs");
    const photoStage = document.getElementById("photoStage");
    const photoImageCurrent = document.getElementById("photoImageCurrent");
    const photoImageNext = document.getElementById("photoImageNext");
    const photoCaption = document.getElementById("photoCaption");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    const state = {
      categoryIndex: 0,
      activityIndex: 0,
      isAnimating: false,
    };

    function escapeXml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function createPlaceholderImage(category, activity) {
      const label = escapeXml(category.type);
      const title = escapeXml(activity.title);
      const date = escapeXml(activity.date);
      const place = escapeXml(activity.place);
      const content = escapeXml(activity.content);

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="${title}">
          <defs>
            <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="18" />
            </filter>
          </defs>
          <rect width="1600" height="1000" fill="#ffffff" />
          <circle cx="250" cy="220" r="190" fill="rgba(0,0,0,0.04)" filter="url(#blur)" />
          <circle cx="1320" cy="760" r="260" fill="rgba(0,0,0,0.04)" filter="url(#blur)" />
          <rect x="110" y="150" width="1380" height="700" rx="40" fill="#ffffff" stroke="#d7e1f0" />
          <text x="130" y="250" fill="#223a5e" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="700">${label}</text>
          <text x="130" y="360" fill="#223a5e" font-size="84" font-family="Arial, Helvetica, sans-serif" font-weight="700">${title}</text>
          <text x="130" y="470" fill="#2e4c78" font-size="46" font-family="Arial, Helvetica, sans-serif">${date}  |  ${place}</text>
          <text x="130" y="560" fill="#2e4c78" font-size="40" font-family="Arial, Helvetica, sans-serif">${content}</text>
          <text x="130" y="810" fill="#5a6e8f" font-size="32" font-family="Arial, Helvetica, sans-serif">Replace this placeholder with your own photo path later.</text>
        </svg>
      `.trim();

      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function getActivityImage(category, activity) {
      if (activity.image) {
        return activity.image;
      }

      return createPlaceholderImage(category, activity);
    }

    function renderCaption(activity) {
      photoCaption.innerHTML = `
        <div class="caption-main">${escapeXml(activity.date)} · ${escapeXml(activity.title)} · ${escapeXml(activity.place)}</div>
        <div class="caption-sub">${escapeXml(activity.content)}</div>
      `;
    }

    function renderTabs() {
      categoryTabs.innerHTML = galleryData
        .map((category, index) => {
          const activeClass = index === state.categoryIndex ? " is-active" : "";
          return `<button class="gallery-tab${activeClass}" type="button" data-index="${index}">${category.type}</button>`;
        })
        .join("");

      categoryTabs.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.categoryIndex = Number(button.dataset.index);
          state.activityIndex = 0;
          render(true);
        });
      });
    }

    function syncViewer(category, activity) {
      const imageUrl = getActivityImage(category, activity);
      photoImageCurrent.src = imageUrl;
      photoImageCurrent.alt = activity.title;
      photoImageNext.removeAttribute("src");
      photoImageNext.alt = "";
      photoImageNext.className = "photo-image photo-image-next";
      renderCaption(activity);
    }

    function render(immediate = false, direction = "next") {
      const category = galleryData[state.categoryIndex];
      const activity = category.activities[state.activityIndex];
      if (immediate || state.isAnimating) {
        syncViewer(category, activity);
        state.isAnimating = false;
        renderTabs();
        return;
      }

      renderTabs();
      syncViewer(category, activity);
    }

    function animateToActivity(nextIndex, direction) {
      if (state.isAnimating) {
        return;
      }

      state.isAnimating = true;
      const category = galleryData[state.categoryIndex];
      const activity = category.activities[nextIndex];
      const imageUrl = getActivityImage(category, activity);
      const outgoingClass = direction === "next" ? "exit-to-left" : "exit-to-right";
      const incomingClass = direction === "next" ? "enter-from-right" : "enter-from-left";

      photoImageNext.src = imageUrl;
      photoImageNext.alt = activity.title;
      photoImageNext.className = `photo-image photo-image-next is-ready ${incomingClass}`;
      photoStage.offsetHeight;
      requestAnimationFrame(() => {
        photoImageCurrent.className = `photo-image photo-image-current ${outgoingClass}`;
        photoImageNext.className = "photo-image photo-image-next is-ready to-center";
      });

      let settled = false;
      const finish = () => {
        if (settled) {
          return;
        }
        settled = true;
        photoImageCurrent.src = photoImageNext.src;
        photoImageCurrent.alt = photoImageNext.alt;
        photoImageCurrent.style.transition = "none";
        photoImageCurrent.className = "photo-image photo-image-current";
        photoImageCurrent.offsetHeight;
        photoImageCurrent.style.removeProperty("transition");
        photoImageNext.removeAttribute("src");
        photoImageNext.alt = "";
        photoImageNext.className = "photo-image photo-image-next";
        renderCaption(activity);
        state.activityIndex = nextIndex;
        state.isAnimating = false;
      };

      photoImageNext.addEventListener(
        "transitionend",
        (event) => {
          if (event.propertyName === "transform") {
            finish();
          }
        },
        { once: true }
      );

      window.setTimeout(finish, 520);
    }

    function previousActivity() {
      const category = galleryData[state.categoryIndex];
      const nextIndex = (state.activityIndex - 1 + category.activities.length) % category.activities.length;
      animateToActivity(nextIndex, "prev");
    }

    function nextActivity() {
      const category = galleryData[state.categoryIndex];
      const nextIndex = (state.activityIndex + 1) % category.activities.length;
      animateToActivity(nextIndex, "next");
    }

    prevButton.addEventListener("click", previousActivity);
    nextButton.addEventListener("click", nextActivity);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        previousActivity();
      }
      if (event.key === "ArrowRight") {
        nextActivity();
      }
    });

    render(true);
  </script>
</body>
</html>
